<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập / Đăng ký</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .form-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .toggle-buttons {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .toggle-buttons button {
            width: 50%;
        }
        .active {
            background-color: #007bff !important;
            color: white !important;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="toggle-buttons">
            <button class="btn btn-outline-primary active" id="login-btn">Đăng nhập</button>
            <button class="btn btn-outline-primary" id="register-btn">Đăng ký</button>
        </div>
        <h3 class="text-center" id="form-title">Đăng nhập</h3>
        <form id="auth-form">
            <div id="login-form">
                <div class="mb-3">
                    <label for="username" class="form-label">Tài khoản, Email hoặc SĐT</label>
                    <input type="text" class="form-control" id="username" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Mật khẩu</label>
                    <input type="password" class="form-control" id="password" required>
                </div>
                <div class="mb-3 d-flex justify-content-between">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="remember-me">
                        <label class="form-check-label" for="remember-me">Lưu mật khẩu</label>
                    </div>
                    <a href="#" data-bs-toggle="modal" data-bs-target="#forgotPasswordModal">Quên mật khẩu?</a>
                </div>
            </div>
            <div id="register-form" class="d-none">
                <div class="mb-3">
                    <label for="fullname" class="form-label">Họ và Tên</label>
                    <input type="text" class="form-control" id="fullname" required>
                </div>
                <div class="mb-3">
                    <label for="dob" class="form-label">Ngày sinh</label>
                    <input type="date" class="form-control" id="dob" required>
                </div>
                <div class="mb-3">
                    <label for="phone" class="form-label">Số điện thoại</label>
                    <input type="tel" class="form-control" id="phone" required>
                </div>
                <div class="mb-3">
                    <label for="reg-username" class="form-label">Tên đăng nhập</label>
                    <input type="text" class="form-control" id="reg-username" required>
                </div>
                <div class="mb-3">
                    <label for="cccd" class="form-label">CCCD</label>
                    <input type="text" class="form-control" id="cccd" required>
                </div>
                <div class="mb-3">
                    <label for="reg-password" class="form-label">Mật khẩu</label>
                    <input type="password" class="form-control" id="reg-password" required>
                </div>
                <div class="mb-3">
                    <label for="confirm-password" class="form-label">Xác nhận mật khẩu</label>
                    <input type="password" class="form-control" id="confirm-password" required>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="agree-terms" required>
                    <label class="form-check-label" for="agree-terms">Tôi đồng ý với các điều khoản</label>
                </div>
                <button type="submit" class="btn btn-primary w-100" id="submit-btn">Đăng ký</button>
                <p class="mt-3">Bạn đã có tài khoản? <a href="#" id="switch-to-login">Đăng nhập</a></p>
            </div>
        </form>
    </div>

    <script>
        function showLogin() {
            document.getElementById('form-title').innerText = 'Đăng nhập';
            document.getElementById('submit-btn').innerText = 'Đăng nhập';
            document.getElementById('login-form').classList.remove('d-none');
            document.getElementById('register-form').classList.add('d-none');
            document.getElementById('login-btn').classList.add('active');
            document.getElementById('register-btn').classList.remove('active');
        }

        function showRegister() {
            document.getElementById('form-title').innerText = 'Đăng ký';
            document.getElementById('submit-btn').innerText = 'Đăng ký';
            document.getElementById('login-form').classList.add('d-none');
            document.getElementById('register-form').classList.remove('d-none');
            document.getElementById('register-btn').classList.add('active');
            document.getElementById('login-btn').classList.remove('active');
        }

        document.getElementById('login-btn').addEventListener('click', showLogin);
        document.getElementById('register-btn').addEventListener('click', showRegister);
        document.getElementById('switch-to-login').addEventListener('click', function(event) {
            event.preventDefault();
            showLogin();
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
